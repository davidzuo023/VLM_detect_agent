name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create .env for testing
      run: |
        echo "DASHSCOPE_API_KEY=sk-test-placeholder" >> .env
        echo "DASHSCOPE_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1" >> .env
        echo "VLM_MODEL=qwen-vl-plus" >> .env
        echo "LLM_MODEL=qwen3.6-plus" >> .env

    - name: Run tests (tools only, no API key needed)
      env:
        PYTHONPATH: .
      run: |
        pytest tests/test_tools.py -v --tb=short